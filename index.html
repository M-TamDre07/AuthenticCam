<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050810">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AuthenticCam Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════
     VIEWFINDER — fullscreen camera
═══════════════════════════════════════════ -->
<div class="vf-wrap" id="vfWrap">
    <video id="video" autoplay playsinline muted></video>
    <!-- live canvas overlay (video mode watermark preview) -->
    <canvas id="liveCanvas"></canvas>

    <!-- HUD: top bar -->
    <div class="hud-top">
        <div class="hud-logo">
            <i class="fas fa-aperture"></i>
            <span>AuthenticCam</span>
            <span class="hud-pro">PRO</span>
        </div>
        <div class="hud-tr">
            <span class="hud-res" id="camResolution">— × —</span>
            <div class="hud-rec" id="recIndicator" style="display:none">
                <span class="rec-dot"></span>REC <span id="recTimer">00:00</span>
            </div>
        </div>
    </div>

    <!-- HUD: focus brackets -->
    <div class="focus-frame">
        <div class="fb tl"></div><div class="fb tr"></div>
        <div class="fb bl"></div><div class="fb br"></div>
    </div>

    <!-- GPS status pill -->
    <div class="gps-pill" id="gpsPill">
        <i class="fas fa-location-dot"></i>
        <span id="gpsStatus">Mengambil lokasi…</span>
    </div>

    <!-- HUD: bottom controls — CAPTURE HERE -->
    <div class="hud-bottom">
        <button class="hud-btn" onclick="flipCamera()" id="flipBtn">
            <i class="fas fa-camera-rotate"></i>
        </button>

        <div class="cap-zone">
            <button class="btn-cap" id="snapBtn" onclick="capturePhoto()">
                <span class="cap-ring"></span>
                <span class="cap-dot"></span>
            </button>
            <button class="btn-cap btn-cap-vid" id="videoBtn" onclick="toggleRecording()" style="display:none">
                <span class="cap-ring cap-ring-red"></span>
                <span class="cap-dot" id="vidDot"></span>
            </button>
        </div>

        <button class="hud-btn" onclick="toggleSettings()" id="settingsBtn">
            <i class="fas fa-sliders"></i>
        </button>
    </div>

    <!-- Flash overlay -->
    <div class="flash" id="flashEl"></div>
</div>

<!-- Mode tabs floating -->
<div class="mode-float" id="modeFloat">
    <button class="mpill active" id="tabPhoto" onclick="switchMode('photo')">
        <i class="fas fa-camera"></i> Foto
    </button>
    <button class="mpill" id="tabVideo" onclick="switchMode('video')">
        <i class="fas fa-video"></i> Video
    </button>
</div>

<!-- ═══════════════════════════════════════════
     SETTINGS DRAWER
═══════════════════════════════════════════ -->
<div class="backdrop" id="backdrop" onclick="toggleSettings()"></div>
<div class="drawer" id="drawer">
    <div class="drw-handle" onclick="toggleSettings()"></div>
    <div class="drw-body">

        <p class="drw-title">Pengaturan</p>

        <!-- Identitas -->
        <div class="dcard" id="cIdentity">
            <div class="dcard-hdr" onclick="toggleCard('cIdentity')">
                <span><i class="fas fa-user-circle"></i> Identitas & Label</span>
                <i class="fas fa-chevron-down tc"></i>
            </div>
            <div class="dcard-body">
                <div class="fg"><label>Nama / Instansi</label>
                    <input type="text" id="ownerName" placeholder="Nama lengkap kamu"></div>
                <div class="fg"><label>Keterangan Aset</label>
                    <input type="text" id="assetInfo" placeholder="Contoh: Dokumentasi FLS2N 2026"></div>
                <div class="fg"><label>Resolusi Kamera</label>
                    <select id="quality">
                        <option value="3840">Ultra HD (4K)</option>
                        <option value="1920" selected>Full HD (1080p)</option>
                        <option value="1280">HD (720p)</option>
                        <option value="640">Standard (480p)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Watermark -->
        <div class="dcard collapsed" id="cWatermark">
            <div class="dcard-hdr" onclick="toggleCard('cWatermark')">
                <span><i class="fas fa-stamp"></i> Kustomisasi Watermark</span>
                <i class="fas fa-chevron-down tc"></i>
            </div>
            <div class="dcard-body">
                <div class="two-col">
                    <div class="fg"><label>Posisi</label>
                        <select id="wmPos">
                            <option value="bottom" selected>Bawah (Strip)</option>
                            <option value="top">Atas (Strip)</option>
                            <option value="corner-bl">Pojok Kiri Bawah</option>
                            <option value="corner-br">Pojok Kanan Bawah</option>
                            <option value="diagonal">Diagonal Tengah</option>
                        </select>
                    </div>
                    <div class="fg"><label>Gaya</label>
                        <select id="wmStyle">
                            <option value="dark" selected>Gelap</option>
                            <option value="light">Terang</option>
                            <option value="glass">Glass</option>
                            <option value="brand">Berwarna</option>
                        </select>
                    </div>
                </div>
                <div class="fg"><label>Opasitas: <span id="opVal">75</span>%</label>
                    <input type="range" id="wmOp" min="20" max="100" value="75" class="slider">
                </div>
                <div class="fg"><label>Logo / Ikon (opsional)</label>
                    <div class="file-drop" onclick="document.getElementById('logoFile').click()">
                        <i class="fas fa-image"></i>
                        <span id="logoName">Upload logo</span>
                    </div>
                    <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="loadLogo(event)">
                </div>
                <!-- Tampilkan GPS di watermark -->
                <label class="toggle-row">
                    <input type="checkbox" id="wmGps" checked>
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    <span>Tampilkan koordinat GPS</span>
                </label>
            </div>
        </div>

        <!-- Enhancement -->
        <div class="dcard collapsed" id="cEnhance">
            <div class="dcard-hdr" onclick="toggleCard('cEnhance')">
                <span><i class="fas fa-wand-magic-sparkles"></i> AI Enhancement</span>
                <span class="badge-new">BARU</span>
                <i class="fas fa-chevron-down tc"></i>
            </div>
            <div class="dcard-body">
                <p class="hint">Tingkatkan kualitas foto kamera HP secara otomatis.</p>
                <div class="presets">
                    <button class="pp active" onclick="setPreset('none')"     id="pNone">Original</button>
                    <button class="pp"        onclick="setPreset('auto')"     id="pAuto">✨ Auto</button>
                    <button class="pp"        onclick="setPreset('vivid')"    id="pVivid">🎨 Vivid</button>
                    <button class="pp"        onclick="setPreset('night')"    id="pNight">🌙 Night</button>
                    <button class="pp"        onclick="setPreset('portrait')" id="pPortrait">🧑 Portrait</button>
                </div>
                <div class="sgroup">
                    <div class="sr"><label><i class="fas fa-sun"></i>Brightness</label><input type="range" id="eBri" min="-100" max="100" value="0" class="slider" oninput="updFilter()"><span id="eBriV" class="sv">0</span></div>
                    <div class="sr"><label><i class="fas fa-circle-half-stroke"></i>Contrast</label><input type="range" id="eCon" min="-100" max="100" value="0" class="slider" oninput="updFilter()"><span id="eConV" class="sv">0</span></div>
                    <div class="sr"><label><i class="fas fa-palette"></i>Saturation</label><input type="range" id="eSat" min="-100" max="100" value="0" class="slider" oninput="updFilter()"><span id="eSatV" class="sv">0</span></div>
                    <div class="sr"><label><i class="fas fa-crosshairs"></i>Sharpness</label><input type="range" id="eShr" min="0" max="100" value="0" class="slider" oninput="updFilter()"><span id="eShrV" class="sv">0</span></div>
                    <div class="sr"><label><i class="fas fa-temperature-half"></i>Warmth</label><input type="range" id="eWrm" min="-100" max="100" value="0" class="slider" oninput="updFilter()"><span id="eWrmV" class="sv">0</span></div>
                </div>
                <button class="btn-ghost-red" onclick="resetFilters()"><i class="fas fa-undo"></i> Reset</button>
            </div>
        </div>

    </div>
</div>

<!-- ═══════════════════════════════════════════
     RESULT MODAL
═══════════════════════════════════════════ -->
<div class="result-overlay" id="resultOverlay" style="display:none">
    <div class="result-box">

        <button class="res-close" onclick="closeResult()"><i class="fas fa-times"></i></button>

        <div class="res-badge" id="resBadge">
            <i class="fas fa-shield-check"></i>
            <span id="resBadgeTxt">Foto Terverifikasi</span>
        </div>

        <!-- Preview -->
        <div class="res-preview">
            <img id="photoPreview" style="display:none" alt="">
            <video id="videoPreview" controls style="display:none; width:100%; border-radius:10px;"></video>
        </div>

        <!-- Metadata card -->
        <div class="meta-card" id="metaCard"></div>

        <!-- Verification hash -->
        <div class="verify-strip" id="verifyStrip"></div>

        <!-- Actions -->
        <div class="res-actions">
            <a id="dlLink" download="AuthenticCam.png">
                <button class="btn-save"><i class="fas fa-download"></i> Simpan</button>
            </a>
            <button class="btn-share" onclick="shareAsset()"><i class="fas fa-share-nodes"></i> Bagikan</button>
        </div>
        <button class="btn-retake" onclick="closeResult()">
            <i class="fas fa-redo"></i> Ambil Lagi
        </button>
    </div>
</div>

<!-- Hidden processing canvas -->
<canvas id="canvas" style="display:none;"></canvas>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () =>
            navigator.serviceWorker.register('./sw.js').catch(() => {})
        );
    }
</script>
<script src="script.js"></script>
</body>
</html>
